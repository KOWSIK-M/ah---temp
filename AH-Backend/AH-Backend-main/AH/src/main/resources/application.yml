spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.transformers.autoconfigure.TransformersEmbeddingModelAutoConfiguration

  profiles:
    active: dev

  application:
    name: anjaneya-herbals

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate   # Flyway owns DDL — Hibernate only validates against it
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate lets Flyway manage an existing DB that was previously
    # created by ddl-auto:update without touching live data.
    baseline-on-migrate: true
    baseline-version: 1
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai: # ── Chat: Groq (100% free, no credit card required) ──────────────────
      # Free key → https://console.groq.com → API Keys → Create
      # Free tier: 14,400 req/day · 6,000 tokens/min · no CC needed ever
      openai:
        api-key: ${GROQ_API_KEY:}
        base-url: https://api.groq.com/openai
        chat:
          options:
            model: llama-3.1-8b-instant   # upgrade to llama-3.1-70b-versatile for better quality (still free)
            temperature: 0.3
            max-tokens: 1024
        embedding:
          enabled: false   # Jina handles embeddings — see AiConfig.java

      # ── Embeddings: Jina AI (free, 1M tokens included, no CC) ────────────
      # Free key → https://jina.ai → Sign Up → API Key

      # ── pgvector — auto-creates vector_store table on first run ──────────
      vectorstore:
        pgvector:
          initialize-schema: true
          dimensions: 1024           # jina-embeddings-v3 output size
          distance-type: COSINE_DISTANCE
          index-type: HNSW

# App Configuration
app:
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  access-expiration: 7200000 # 2 hours (in milliseconds)
  refresh-expiration: 2592000000 # 30 days (in milliseconds)

# Cookie Configuration
cookie:
  secure: false # Set to true in production with HTTPS

# CORS Configuration
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

# Cloudinary Configuration
cloudinary:
  cloud-name: dlgwz9tj9
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  folder: ""

# Contact Form Settings
contact:
  email:
    to: medamkowsik2004@gmail.com

# Server Configuration
server:
  port: ${PORT:8888}

# Jina AI key — bridges JINA_API_KEY env var to the jina.api-key property
# used by @Value("${jina.api-key:}") in AiConfig.java
# Free key → https://jina.ai → Sign Up → API Key
jina:
  api-key: ${JINA_API_KEY:}

# Razorpay Payment Gateway
# Get keys from: https://dashboard.razorpay.com/app/keys
# Test keys start with rzp_test_, live keys with rzp_live_
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_YOUR_KEY_HERE}
    secret: ${RAZORPAY_KEY_SECRET:YOUR_SECRET_HERE}

# Spring AI Configuration
